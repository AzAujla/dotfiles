# Music Visualizer Label
label {
    # 50ms update rate (cmd[update:50]) for fluid animation
    # text = cmd[update:1000] $HOME/.config/hyprlock/scripts/cava.sh
    text = cmd[update:200] { cat /dev/shm/cava_bar || echo "▁▁▁▁▁▁▁▁▁▁▁▁▁▁" }
    font_family = JetBrains Mono Nerd Font Mono
    font_size = 40
    color = rgba(114, 2, 11, 0.85)
    halign = center
    valign = center
    position = 0, -315
    markup = false
    zindex = 5
}
