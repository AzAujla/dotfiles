# PLAYER TITLE
label {
    monitor =
    text = cmd[update:1000] $music --title
    color = rgba(0, 0, 0, 0.8)
    font_size = 15
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 0, -50
    halign = center
    valign = center
    zindex = 5
}

# PLAYER ARTIST
label {
    monitor =
    text = cmd[update:1000] echo "$($music --artist)"
    color = rgba(0, 0, 0, 0.8)
    font_size = 12
    font_family = JetBrains Mono Nerd Font Mon440, 110o ExtraBold
    position = 0, -90
    halign = center
    valign = center
    zindex = 5
}

# Step Backward
label {
    monitor =
    text = 
    onclick = playerctl previous
    color = rgba(0, 0, 0, 1)
    font_size = 25
    position = -60, -150
    halign = center
    valign = center
    zindex = 5
}

# PLAYER STATUS
label {
    monitor =
    text = cmd[update:1000] echo "$($music --status)"
    onclick = playerctl play-pause
    color = rgba(0, 0, 0, 1)
    font_size = 21
    position = 0, -150
    halign = center
    valign = center
    zindex = 5
}

# Step Forward
label {
    monitor =
    text = 
    onclick = playerctl next
    color = rgba(0, 0, 0, 1)
    font_size = 25
    position = 60, -150
    halign = center
    valign = center
    zindex = 5
}

