# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

# Monitors
monitor=,preferred,auto,1

# AutoStart
exec-once = awww-daemon
exec-once = ~/.config/hypr/wallpaper.sh
exec-once = waybar
exec-once = swaync
exec-once = thunar --daemon

# Workspace Layout
exec-once = [workspace 2 silent] firefox
# exec-once = ~/.config/hypr/launch-layout.sh
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# General
general {
  gaps_in = 5
  gaps_out = 10
  border_size = 3
  col.active_border = rgba(a4133cff) rgba(1a1a1aff) 45deg
  col.inactive_border = rgba(313244ff)
}

decoration {
  rounding = 10
  blur {
    enabled = true
    size = 6
    passes = 3
    new_optimizations = true
    special = true
    popups = false
  }
}

# WPS Office fixes
windowrule = match:class ^(wps|et|wps-office)$, no_blur 1

animations {
  enabled = true
  bezier = smooth, 0.05, 0.9, 0.1, 1.05
  animation = windows, 1, 7, smooth
  animation = windowsOut, 1, 7, default, popin 80%
  animation = workspaces, 1, 7, smooth, slide
}

input {
  touchpad {
    natural_scroll = true
  }

  kb_layout = us
  kb_options = compose:ralt
}
$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun -theme ~/.config/rofi/launchers/type-2/style-6.rasi || pkill rofi


#Keybinds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod SHIFT, M, exec, systemctl poweroff
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, W, exec, pkill waybar && waybar &
bind = $mainMod SHIFT, L, exec, hyprlock
# bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2  --selector-args="-theme ~/.config/rofi/launchers/type-1/style-4.rasi" | cliphist decode | wl-copy
bind = $mainMod, V, exec, sh -c 'pkill rofi || cliphist list | rofi -dmenu -display-columns 2 -theme ~/.config/rofi/launchers/type-1/style-4.rasi | cliphist decode | wl-copy'
# bind = $mainMod, V, exec, sh -c 'pkill rofi || cliphist list | rofi -dmenu -display-columns 2 -theme ~/.config/rofi/launchers/type-1/style-4.rasi | cliphist decode | { content=$(cat); echo "$content" | wl-copy; echo "$content" | wtype -; }'
# bind = $mainMod, V, exec, cliphist-rofi-img | rofi -dmenu -show-icons | cliphist decode | wl-copy
# bind = $mainMod, V, exec, rofi -modi "clipboard:/usr/bin/cliphist-rofi-img" -show clipboard -show-icons
bind = $mainMod, N, exec, swaync-client -t -sw
#Screen Recoding
bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/toggle-record.sh
bind = $mainMod CTRL SHIFT, R, exec, ~/.config/hypr/scripts/toggle-record-slurp.sh

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# bind = $mainMod, D, exec, pkill -f "wallpaper.sh" && ~/.config/hypr/wallpaper.sh &
# bind = $mainMod, D, exec, pgrep -f "/.config/hypr/wallpaper.sh" | xargs -r kill && nohup ~/.config/hypr/wallpaper.sh >/dev/null 2>&1 &
bind = $mainMod, D, exec, sh -c 'pkill -x wallpaper.sh; nohup ~/.config/hypr/wallpaper.sh >/dev/null 2>&1 &'
bind = $mainMod, I, exec, rofi -modi nerdy -show nerdy -theme ~/.config/rofi/launchers/type-2/style-6.rasi

#Alt Tab
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = ALT, Tab, workspace, previous
bind = ALT SHIFT, Tab, workspace, next
bind = CTRL, Tab, exec, ~/.config/hypr/scripts/ctrl-tab.sh next
bind = CTRL SHIFT, Tab, exec, ~/.config/hypr/scripts/ctrl-tab.sh prev

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7

# Screenshot region (like Shift+Win+S)
bind = $mainMod SHIFT, S, exec, hyprshot --freeze -m region --clipboard-only

# Screenshot full screen
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh

#Resize
binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, L, resizeactive, 30 0
binde = $mainMod CTRL, J, resizeactive, 0 30
binde = $mainMod CTRL, K, resizeactive, 0 -30

# Drag to resize with SUPER + Right-Click
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = $mainMod , l, moveactive, 30 0
bindel = $mainMod , h, moveactive, -30 0
bindel = $mainMod , k, moveactive, 0 -30
bindel = $mainMod , j, moveactive, 0 30

# Brightness
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 10%+

# Volume
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

bind = $mainMod, period, exec, rofimoji \
         --selector-args="-theme ~/.config/rofi/launchers/type-5/style-5.rasi" \
         --skin-tone neutral \

# Media
bindel = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86AudioPlay, exec, playerctl play-pause
bindel = , XF86AudioNext, exec, playerctl next
bind = , XF86Calculator, exec, rofi -show calc -modi calc -theme ~/.config/rofi/launchers/type-1/style-3.rasi || pkill rofi

# Normal rotations
bind = $mainMod SHIFT, up, exec, hyprctl keyword monitor "eDP-1,preferred,auto,1,transform,0"
bind = $mainMod SHIFT, right, exec, hyprctl keyword monitor "eDP-1,preferred,auto,1,transform,1"
bind = $mainMod SHIFT, down, exec, hyprctl keyword monitor "eDP-1,preferred,auto,1,transform,2"
bind = $mainMod SHIFT, left, exec, hyprctl keyword monitor "eDP-1,preferred,auto,1,transform,3"

# Flipped rotations
bind = $mainMod CTRL SHIFT, up, exec, hyprctl keyword monitor "eDP-1,preferred,auto,1,transform,4"
bind = $mainMod CTRL SHIFT, right, exec, hyprctl keyword monitor "eDP-1,preferred,auto,1,transform,5"
bind = $mainMod CTRL SHIFT, down, exec, hyprctl keyword monitor "eDP-1,preferred,auto,1,transform,6"
bind = $mainMod CTRL SHIFT, left, exec, hyprctl keyword monitor "eDP-1,preferred,auto,1,transform,7"

env = XCURSOR_THEME,luciaic-64-hc
env = XCURSOR_SIZE,64
env = HYPRCURSOR_THEME,luciaic-64-hc
env = HYPRCURSOR_SIZE,64
